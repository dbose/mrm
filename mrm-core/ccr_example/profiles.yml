# MRM Profile Configuration
#
# Environment-specific bindings. Everything host/credential/bucket-shaped
# lives here, never in mrm_project.yml. Selected at runtime via
# ``mrm --profile dev`` or ``--profile prod``.
mrm:
  target: dev
  outputs:
    dev:
      backends:
        default_results:
          type: local
          path: ~/.mrm/data/ccr_dev
        default_evidence:
          type: local
        default_replay:
          type: local
        root_signer:
          type: local
          key_path: ~/.mrm/keys/ccr_dev_root.key
      catalogs:
        databricks:
          host: "{{ env_var('DATABRICKS_HOST_DEV') }}"
          token: "{{ env_var('DATABRICKS_TOKEN_DEV') }}"
          catalog: workspace_dev
          schema: sandbox
          cache_ttl_seconds: 60

    prod:
      backends:
        default_results:
          type: mlflow
          tracking_uri: "{{ env_var('MLFLOW_TRACKING_URI') }}"
          experiment_name: ccr-validation-prod
        default_evidence:
          type: s3_object_lock
          bucket: bank-evidence-prod
          region: ap-southeast-2
        default_replay:
          type: s3
          bucket: bank-replay-prod
          region: ap-southeast-2
        root_signer:
          type: kms
          key_uri: aws-kms://ap-southeast-2/alias/mrm-root-prod
      catalogs:
        databricks:
          host: "{{ env_var('DATABRICKS_HOST_PROD') }}"
          token: "{{ env_var('DATABRICKS_TOKEN_PROD') }}"
          catalog: workspace_prod
          schema: gold
          cache_ttl_seconds: 600
